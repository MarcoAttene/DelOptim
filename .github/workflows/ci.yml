name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. new pushes to a PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.os }} ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        # Linux (x86_64), macOS (Apple Silicon / arm64), Windows (x86_64).
        os: [ubuntu-latest, macos-14, windows-latest]
        build_type: [Debug, Release]
        include:
          # Debug builds are unoptimised and slow, so only run a single capped
          # invocation instead of the full per-flag sweep.
          - build_type: Debug
            test_args: -DDELMESHER_TEST_SMOKE=ON -DDELMESHER_TEST_MAX_VERTICES=1000
          # Release runs every accepted CLI flag (default cap of 2000).
          - build_type: Release
            test_args: ""

    steps:
      - uses: actions/checkout@v4

      # CMAKE_BUILD_TYPE drives single-config generators (Make/Ninja on
      # Linux/macOS); --config below drives the multi-config Visual Studio
      # generator on Windows. Setting both makes one workflow cover all three.
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} ${{ matrix.test_args }}

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Test
        run: ctest --test-dir build -C ${{ matrix.build_type }} --output-on-failure
