name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. new pushes to a PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.os }} ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        # Linux (x86_64), macOS (Apple Silicon / arm64), Windows (x86_64).
        os: [ubuntu-latest, macos-14, windows-latest]
        build_type: [Debug, Release]
        include:
          # Debug builds are unoptimised and slow, so only run a single capped
          # invocation instead of the full per-flag sweep.
          - build_type: Debug
            test_args: -DDELMESHER_TEST_SMOKE=ON -DDELMESHER_TEST_MAX_VERTICES=1000
          # Release runs every accepted CLI flag (default cap of 2000).
          - build_type: Release
            test_args: ""

    steps:
      - uses: actions/checkout@v4

      # CMAKE_BUILD_TYPE drives single-config generators (Make/Ninja on
      # Linux/macOS); --config below drives the multi-config Visual Studio
      # generator on Windows. Setting both makes one workflow cover all three.
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} ${{ matrix.test_args }}

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Test
        run: ctest --test-dir build -C ${{ matrix.build_type }} --output-on-failure

  python:
    name: python ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        # Linux (x86_64) and macOS (Apple Silicon / arm64) run the full,
        # process-isolated suite. Windows builds the wheel and runs a single
        # in-process smoke (fork-based isolation is POSIX-only).
        os: [ubuntu-latest, macos-14, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The parity tests compare the bindings against the CLI's .tet output, so
      # build the executable first (POSIX, where the full suite runs).
      - name: Build CLI (for parity tests)
        if: runner.os != 'Windows'
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DDELMESHER_BUILD_TESTS=OFF
          cmake --build build --config Release --target delmesher --parallel

      # Compiles the nanobind extension via scikit-build-core (fetches nanobind
      # and, on ARM, SIMDe automatically). Also exercises the PyPI wheel path.
      - name: Install Python package
        run: python -m pip install -v ".[test]"

      - name: Test (Linux/macOS)
        if: runner.os != 'Windows'
        env:
          DELMESHER_BINARY: ${{ github.workspace }}/build/delmesher
          DELMESHER_TEST_MAX_VERTICES: "800"
        run: python -m pytest tests/python -v

      - name: Smoke test (Windows, single in-process run)
        if: runner.os == 'Windows'
        run: >
          python -c "import numpy as np, delmesher;
          v, f = delmesher.read_off('input_models/boeing_part.off');
          r = delmesher.tetrahedralize(v, f, max_vertices=500);
          assert r.tetrahedra.ndim == 2 and r.tetrahedra.shape[1] == 4 and len(r.tetrahedra) > 0;
          print('windows ok', r.vertices.shape, r.tetrahedra.shape)"
